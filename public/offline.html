<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audio Novel BR - Offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #020b0d;
        color: #f4f4f5;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(24, 183, 189, 0.16), transparent 34%), #020b0d;
      }

      main {
        margin: 0 auto;
        max-width: 980px;
        padding: 24px 16px 48px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      img {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        object-fit: cover;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: 0;
      }

      .muted {
        color: #a1a1aa;
      }

      .panel,
      details {
        border-radius: 8px;
        background: #06272b;
      }

      .panel {
        display: grid;
        gap: 18px;
        margin-bottom: 18px;
        padding: 18px;
      }

      .progress {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
      }

      .progress span {
        display: block;
        height: 100%;
        width: 0%;
        background: #18b7bd;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      button,
      select {
        border: 0;
        border-radius: 999px;
        font-weight: 900;
      }

      button {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px 14px;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      button.primary {
        background: #18b7bd;
        color: #021114;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input[type="range"] {
        accent-color: #18b7bd;
        min-width: 140px;
      }

      select {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #020b0d;
        color: white;
        padding: 9px 12px;
      }

      details {
        overflow: hidden;
        margin-bottom: 10px;
      }

      summary {
        display: flex;
        cursor: pointer;
        list-style: none;
        justify-content: space-between;
        gap: 16px;
        background: #08353a;
        padding: 14px 16px;
        font-weight: 900;
      }

      .chapter {
        display: grid;
        width: 100%;
        border-radius: 6px;
        background: rgba(2, 11, 13, 0.55);
        padding: 12px;
        text-align: left;
      }

      .chapters {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .active {
        outline: 1px solid rgba(24, 183, 189, 0.5);
        background: rgba(24, 183, 189, 0.13);
      }

      .message {
        border-radius: 6px;
        background: rgba(239, 68, 68, 0.14);
        color: #fecaca;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="/logo-audio-novel-br.png" alt="Audio Novel BR" />
        <div>
          <p class="muted">Modo offline</p>
          <h1>Audio Novel BR</h1>
        </div>
      </header>

      <section class="panel">
        <div>
          <p class="muted">Tocando offline</p>
          <h2 id="now-title">Escolha um capitulo salvo</h2>
          <p id="now-subtitle" class="muted">Os audios salvos ficam disponiveis por ate 7 dias.</p>
        </div>
        <audio id="audio"></audio>
        <div class="progress"><span id="progress-bar"></span></div>
        <div class="row">
          <span id="current-time" class="muted">0:00</span>
          <input id="seek" type="range" min="0" max="0" step="1" value="0" aria-label="Progresso do audio" />
          <span id="duration" class="muted">--:--</span>
        </div>
        <div class="row">
          <button id="back">-10s</button>
          <button id="play" class="primary" disabled>Play</button>
          <button id="forward">+10s</button>
          <label class="row muted">
            Volume
            <input id="volume" type="range" min="0" max="1" step="0.05" value="0.85" aria-label="Volume" />
          </label>
          <label class="row muted">
            Velocidade
            <select id="speed" aria-label="Velocidade">
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
          </label>
        </div>
        <p id="message" class="message" hidden></p>
      </section>

      <section id="list"></section>
    </main>
    <script src="/offline-app.js"></script>
  </body>
</html>
