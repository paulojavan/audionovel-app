<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#18b7bd">
  <title>Offline - Audio Novel BR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #18b7bd;
      --accent-strong: #22d3dc;
      --bg: #03191c;
      --bg-dark: #020b0d;
      --panel: #06272b;
      --text: #f8ffff;
      --muted: #9fbcc0;
    }

    html {
      background: var(--bg-dark);
      min-height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top left, rgba(24, 183, 189, 0.18), transparent 30rem),
                  linear-gradient(180deg, var(--bg) 0%, var(--bg-dark) 100%);
      color: var(--text);
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      text-align: center;
      overflow: hidden;
    }

    /* Animated background orbs */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -20%;
      width: 60%;
      height: 60%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(24, 183, 189, 0.08) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -20%;
      width: 50%;
      height: 50%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(24, 183, 189, 0.05) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite 2s;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 22rem;
      width: 100%;
    }

    .icon-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .icon-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      box-shadow: 0 0 0 1px rgba(24, 183, 189, 0.3), 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: float 3s ease-in-out infinite;
    }

    .icon-wrapper::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 12px;
      background: radial-gradient(ellipse, rgba(24, 183, 189, 0.3) 0%, transparent 70%);
      filter: blur(4px);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .wifi-icon {
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .wifi-icon svg {
      width: 48px;
      height: 48px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.9375rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(6, 39, 43, 0.8);
      border: 1px solid rgba(24, 183, 189, 0.2);
      border-radius: 9999px;
      padding: 0.375rem 0.875rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: none;
      border-radius: 9999px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 900;
      cursor: pointer;
      min-height: 48px;
      padding: 0.75rem 1.5rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn-primary {
      background: var(--accent);
      color: #021114;
      width: 100%;
      box-shadow: 0 4px 16px rgba(24, 183, 189, 0.25);
    }

    .btn-primary:hover, .btn-primary:active {
      background: var(--accent-strong);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(24, 183, 189, 0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(24, 183, 189, 0.2);
      width: 100%;
    }

    .btn-secondary:hover, .btn-secondary:active {
      background: rgba(24, 183, 189, 0.08);
      color: var(--text);
      border-color: rgba(24, 183, 189, 0.4);
    }

    .hint {
      font-size: 0.75rem;
      color: rgba(159, 188, 192, 0.5);
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(2, 17, 20, 0.3);
      border-top-color: #021114;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    button.loading .spinner { display: inline-block; }
    button.loading .btn-text { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <img src="/icons/icon-192x192.png" alt="Audio Novel BR" onerror="this.style.display='none'">
    </div>

    <div class="wifi-icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
    </div>

    <div>
      <h1>Você está offline</h1>
    </div>

    <div class="status-badge">
      <span class="status-dot"></span>
      Sem conexão com a internet
    </div>

    <p>Conecte-se à internet para acessar o catálogo completo de novels e audiolivros.</p>

    <div class="actions">
      <button class="btn-primary" onclick="tryReload(this)" id="reload-btn">
        <span class="spinner"></span>
        <span class="btn-text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:4px">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Tentar novamente
        </span>
      </button>

      <button class="btn-secondary" onclick="goHome()" id="home-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:4px">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Ir para o início
      </button>
    </div>

    <p class="hint">Conteúdo offline disponível para assinantes premium</p>
  </div>

  <script>
    function tryReload(btn) {
      btn.classList.add('loading');
      btn.disabled = true;
      setTimeout(() => window.location.reload(), 300);
    }

    function goHome() {
      window.location.href = '/';
    }

    // Auto-reconnect: recarrega quando a conexão voltar
    window.addEventListener('online', () => {
      setTimeout(() => window.location.reload(), 500);
    });
  </script>
</body>
</html>
