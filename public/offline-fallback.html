<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Audio Novel BR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #03191c;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: #06272b;
      border: 1px solid rgba(24, 183, 189, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #18b7bd;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
    }
    p {
      color: #a1a1aa;
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #18b7bd;
      color: #021114;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 900;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #22d3dc; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </div>
  <h1>Voce esta offline</h1>
  <p>Conecte-se a internet para acessar o catalogo completo de novels.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
